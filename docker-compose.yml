version: '3.8'

services:
  bilibili-monitor:
    build: .
    container_name: bilibili-comment-monitor
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
      - ./bili_cookie.txt:/app/bili_cookie.txt
      - ./webhook_config.txt:/app/webhook_config.txt
      - ./bilibili_monitor.db:/app/bilibili_monitor.db
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
